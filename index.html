<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f2f2f2;
}

/* Barra superior */
.topbar{
    background:#000;
    color:white;
    padding:15px 8%;
    text-align:right;
    font-size:14px;
}

.topbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

/* Header azul */
.hero{
    background: linear-gradient(90deg,#003b91,#0066ff);
    color:white;
    padding:60px 8% 140px;
}

.logo{
    font-size:60px;
    font-weight:bold;
}

.logo span{
    font-size:18px;
    vertical-align:top;
}

.subtitle{
    font-size:28px;
    margin-top:10px;
}

/* Buscador */
.search-box{
    margin-top:30px;
    max-width:450px;
    position:relative;
}

.search-box input{
    width:100%;
    padding:18px 50px 18px 20px;
    border:none;
    border-radius:8px;
    font-size:18px;
    outline:none;
}

.search-box i{
    position:absolute;
    right:18px;
    top:18px;
    color:#888;
    font-size:22px;
}

/* Cards */
.cards{
    width:85%;
    margin:-80px auto 50px;
    display:flex;
    gap:30px;
    justify-content:center;
    flex-wrap:wrap;
}

.card{
    background:#efefef;
    width:320px;
    height:250px;
    border-radius:15px;
    box-shadow:0 6px 18px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-8px);
}

.icon-circle{
    width:90px;
    height:90px;
    background:#e2e2e2;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:25px;
}

.icon-circle i{
    font-size:40px;
    color:#162847;
}

.card h3{
    text-align:center;
    color:#444;
    font-size:20px;
}

/* Responsive */
@media(max-width:900px){
    .logo{
        font-size:50px;
    }

    .cards{
        flex-direction:column;
        align-items:center;
    }

    .card{
        width:90%;
    }
}
</style>
</head>
